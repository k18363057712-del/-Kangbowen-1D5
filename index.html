<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hometown Page!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拖动文字时干扰视觉，但不影响按钮点击 */
        }

        body {
            width: 100%;
            min-height: 100vh;
            background-color: #000000;  /* 纯黑背景 */
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* ----- 背景 Emoji 层 (固定视口，铺满全屏) ----- */
        .emoji-cloud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;      /* 让所有表情不干扰点击按钮 */
            overflow: hidden;
        }

        /* 每个 emoji 的通用样式 */
        .emoji-item {
            position: absolute;
            white-space: nowrap;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
            transition: transform 0.2s ease;
            will-change: transform, top, left;
            animation: floatEmoji 6s infinite alternate ease-in-out;
        }

        /* 漂浮动画：上下轻柔移动 + 微微旋转 */
        @keyframes floatEmoji {
            0% {
                transform: translateY(0px) rotate(0deg);
            }
            100% {
                transform: translateY(-12px) rotate(3deg);
            }
        }

        /* 主容器：让圆弧框垂直水平居中 */
        .hero {
            position: relative;
            z-index: 20;               /* 确保卡片在 emoji 层之上 */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* 浅灰色圆弧框 (圆润卡片) */
        .welcome-card {
            background-color: #eef2f5;   /* 浅灰，柔和干净 */
            border-radius: 68px;          /* 圆弧感饱满，像一个大气圆角框 */
            max-width: 680px;
            width: 100%;
            padding: 3rem 2rem 3rem 2rem;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255,255,255,0.2) inset;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            backdrop-filter: blur(0px);   /* 无模糊，保持纯浅灰实体感 */
        }

        /* 卡片悬浮轻微提升 (非必须，但增加精致感) */
        .welcome-card:hover {
            transform: scale(1.01);
            box-shadow: 0 30px 55px rgba(0, 0, 0, 0.4);
        }

        /* 主标题文字 */
        .greeting-text {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1e2a3a;              /* 深灰蓝黑色，阅读清晰 */
            letter-spacing: 1px;
            margin-bottom: 2rem;
            word-break: keep-all;
            line-height: 1.3;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
        }

        /* 响应式文字大小 */
        @media (max-width: 550px) {
            .greeting-text {
                font-size: 1.8rem;
            }
            .welcome-card {
                padding: 2rem 1.5rem;
                border-radius: 48px;
            }
        }

        /* 红色按钮样式 */
        .enter-btn {
            display: inline-block;
            background-color: #e3342f;     /* 明亮红色 */
            border: none;
            padding: 14px 36px;
            font-size: 1.6rem;
            font-weight: bold;
            font-family: inherit;
            color: white;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-radius: 60px;            /* 圆润按钮 */
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 6px 0 #9b1f1a;
            outline: none;
            width: auto;
            min-width: 180px;
        }

        /* 鼠标悬停时变成粉色，并且轻微上浮效果 */
        .enter-btn:hover {
            background-color: #f472b6;      /* 粉红可爱 */
            transform: translateY(-3px);
            box-shadow: 0 9px 0 #a53f6b;
        }

        /* 点击时还原微动感 */
        .enter-btn:active {
            transform: translateY(2px);
            box-shadow: 0 4px 0 #9b1f1a;
            transition: 0.05s;
        }

        /* 按钮获得焦点时同样可爱 (辅助功能) */
        .enter-btn:focus-visible {
            outline: 3px solid #ffb8d2;
            outline-offset: 3px;
        }

        /* 简单装饰：卡片内可加点缀线，但保持简洁 */
        @media (max-width: 450px) {
            .enter-btn {
                font-size: 1.3rem;
                padding: 10px 28px;
                min-width: 150px;
            }
        }
    </style>
</head>
<body>

                "🍨", "🍩", "🍪", "🎂", "🍰", "🧁", "🥧", "🍫", "🍬", "🍭", "🍮", "🍯", "☕", "🍵", "🧃", "🥤", "🧋",
                "🍶", "🍺", "🍻", "🥂", "🥃", "🥄", "🍴", "🍽️", "⚽", "🏀", "🏈", "⚾", "🎾", "🏐", "🏉", "🎱", "🏓",

                "💥", "⭐", "🌟", "✨", "☄️", "💫", "🔥", "💧", "💨", "🌊"
            ];
            
            // 获取容器
            const container = document.getElementById('emojiContainer');
            if (!container) return;
            
            // 生成随机整数 [min,max]
            function randomRange(min, max) {
                return Math.floor(Math.random() * (max - min + 1) + min);
            }
            
            // 随机浮点数 (百分比 / 透明度)
            function randomFloat(min, max) {
                return Math.random() * (max - min) + min;
            }
            
            // 生成 emoji 数量：根据屏幕大小动态调整（大屏多一点，小屏稍少，但依然很丰富）
            // 基础数量约 160 个，保证满屏热闹效果
            let emojiCount = 180;
            // 如果屏幕比较小 (宽度<600) 适当减少一点但依然有80+，依然“很多”
            if (window.innerWidth < 600) {
                emojiCount = 110;
            }
            if (window.innerHeight < 500) {
                emojiCount = 100;
            }
            
            // 避免重复渲染过于频繁，一次性生成所有 emoji 元素
            const fragment = document.createDocumentFragment();
            
            for (let i = 0; i < emojiCount; i++) {
                // 随机取一个 emoji
                const randomEmoji = emojiList[Math.floor(Math.random() * emojiList.length)];
                const span = document.createElement('span');
                span.className = 'emoji-item';
                span.textContent = randomEmoji;
                
                // 随机位置 (百分比，相对于视口宽高)
                const leftPos = randomFloat(0, 100);   // vw 百分比
                const topPos = randomFloat(0, 100);    // vh 百分比
                span.style.left = `${leftPos}%`;
                span.style.top = `${topPos}%`;
                
                // 随机大小: 1.2rem 到 4rem 之间 (大表情小表情错落)
                const size = randomRange(22, 68);
                span.style.fontSize = `${size}px`;
                span.style.opacity = randomFloat(0.35, 0.9);  // 半透明~鲜艳，层次感
                
                // 随机初始旋转角度 (0~360deg)

                span.style.transform = `rotate(${initRotate}deg)`;
                
                // 为漂浮动画添加随机延迟和随机时长，错落有致
                const duration = randomFloat(3.5, 9);    // 动画周期 3.5~9秒
                const delay = randomFloat(-3, 5);        // 延迟不同，避免整齐划一
                span.style.animationDuration = `${duration}s`;
                span.style.animationDelay = `${delay}s`;
                
                // 稍微增加微小的水平浮动？可通过不同动画方向，不过基本漂浮上下已经很可爱

                // 为了增加变化，可为部分 emoji 添加不同的动画幅度，通过自定义属性？ 简化但足够活泼
                
                // 额外：少许滤镜让表情更鲜活

                span.style.willChange = 'transform';
                
                fragment.appendChild(span);
            }
            
            // 额外增加 20% 的补充表情，让“很多 emoji 表情包”感觉更饱满 (根据屏幕尺寸微调)

                span.style.fontSize = `${size}px`;
                span.style.opacity = randomFloat(0.3, 0.85);

                span.style.animationDuration = `${randomFloat(4, 10)}s`;
                span.style.animationDelay = `${randomFloat(-2, 6)}s`;
                fragment.appendChild(span);
            }
